name: Build wheel and optional PyPI publish

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "构建完成后自动上传到 PyPI？（仅允许从 Tag 运行时上传）"
        type: boolean
        default: false
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (fetch tags for version)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Upgrade tooling
        run: |
          python -m pip install -U pip setuptools wheel build twine

      # 仅用于打印提示，方便你在日志里一眼看出当前 ref
      - name: Show ref
        run: |
          echo "ref: $GITHUB_REF"
          echo "ref_name: $GITHUB_REF_NAME"

      - name: Build wheel
        run: |
          python -m build --wheel
          ls -lah dist

      - name: Resolve wheel filename
        id: wheel
        shell: bash
        run: |
          set -euo pipefail
          wheel_path="$(ls -1 dist/*.whl | head -n 1)"
          echo "path=$wheel_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$wheel_path")" >> "$GITHUB_OUTPUT"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifacts 列表显示的是 artifact 名称，而不是内部文件名。
          # 这里将 artifact 名称设置为实际生成的 whl 文件名，便于下载时识别。
          name: ${{ steps.wheel.outputs.name }}
          path: ${{ steps.wheel.outputs.path }}

      - name: Publish to PyPI (only when running from a tag)
        # 触发条件：
        # - 手动运行：勾选 publish_to_pypi=true 且从 tag 运行
        #
        if: >-
          ${{
            startsWith(github.ref, 'refs/tags/')
            && github.event_name == 'workflow_dispatch'
            && github.event.inputs.publish_to_pypi == 'true'
          }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload --non-interactive dist/*.whl
